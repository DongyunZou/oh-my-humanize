<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oh My Humanize Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #070b12;
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      color: #f8fbff;
      background:
        linear-gradient(135deg, #070b12 0%, #101827 58%, #1a0d24 100%);
      overflow: hidden;
    }
    .grid {
      position: absolute;
      inset: 0;
      opacity: .13;
      background-image:
        linear-gradient(rgba(216,245,255,.24) 1px, transparent 1px),
        linear-gradient(90deg, rgba(216,245,255,.24) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    .line {
      position: absolute;
      inset: 0;
      opacity: .9;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      text-align: center;
    }
    .logo {
      width: 172px;
      height: 130px;
      filter: drop-shadow(0 0 28px rgba(56, 215, 255, .25));
    }
    .title {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
    }
    .tagline {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(224,239,255,.62);
      font-size: 14px;
      letter-spacing: .34em;
      text-transform: uppercase;
    }
    .pill {
      margin-top: 4px;
      padding: 8px 14px;
      border: 1px solid rgba(167,107,255,.36);
      border-radius: 999px;
      color: rgba(224,239,255,.74);
      background: rgba(8,14,24,.58);
      box-shadow: 0 0 32px rgba(167,107,255,.12);
      font-size: 12px;
      letter-spacing: .12em;
    }
    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: rgba(248,251,255,.12);
      border-style: solid;
      border-width: 0;
    }
    .tl { top: 18px; left: 18px; border-top-width: 2px; border-left-width: 2px; }
    .tr { top: 18px; right: 18px; border-top-width: 2px; border-right-width: 2px; }
    .bl { bottom: 18px; left: 18px; border-bottom-width: 2px; border-left-width: 2px; }
    .br { bottom: 18px; right: 18px; border-bottom-width: 2px; border-right-width: 2px; }
  </style>
</head>
<body>
  <main class="stage">
    <div class="grid"></div>
    <svg class="line" viewBox="0 0 1500 540" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="flow" x1="200" y1="80" x2="1320" y2="460" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#38d7ff"/>
          <stop offset=".5" stop-color="#a76bff"/>
          <stop offset="1" stop-color="#ff5ea8"/>
        </linearGradient>
      </defs>
      <path d="M120 310 C260 130 410 130 550 310 S850 490 1030 240 S1290 110 1400 270" fill="none" stroke="url(#flow)" stroke-width="5" stroke-linecap="round"/>
    </svg>
    <section class="content">
      <svg class="logo" viewBox="0 0 120 90" aria-label="OMH">
        <defs>
          <linearGradient id="nodes" x1="8" y1="10" x2="112" y2="82" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#38d7ff"/>
            <stop offset=".48" stop-color="#a76bff"/>
            <stop offset="1" stop-color="#ff5ea8"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="116" height="86" rx="18" fill="#090d14"/>
        <path d="M28 45h22m20 0h22M50 45V27m0 18v18m20-18V27m0 18v18" fill="none" stroke="url(#nodes)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="28" cy="45" r="9" fill="#38d7ff"/>
        <circle cx="50" cy="27" r="8" fill="#75a7ff"/>
        <circle cx="50" cy="63" r="8" fill="#8f7cff"/>
        <circle cx="70" cy="27" r="8" fill="#b66cff"/>
        <circle cx="70" cy="63" r="8" fill="#df64d2"/>
        <circle cx="92" cy="45" r="9" fill="#ff5ea8"/>
        <text x="60" y="49" text-anchor="middle" font-size="12" font-weight="800" letter-spacing="1.6" fill="#f8fbff">OMH</text>
      </svg>
      <div class="title">Oh My Humanize</div>
      <div class="tagline"><span>[</span><span>agentic workflow cockpit</span><span>]</span></div>
      <div class="pill">freeze -> run -> observe -> intervene -> evolve</div>
    </section>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </main>
</body>
</html>
